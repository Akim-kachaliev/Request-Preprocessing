services:
  mongo:
    image: mongo:8.2.3
    container_name: request-ranking-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: request-ranking-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data

  backend:
    build: .
    container_name: request-ranking-backend
    depends_on:
      - mongo
      - kafka
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ranking_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: requests.created
      KAFKA_CONSUMER_GROUP: request-ranking-backend
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  mongo-data:
  kafka-data: